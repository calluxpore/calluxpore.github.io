<p class="lead">An interactive force-directed map of the categories on this blog. Drag nodes to explore relationships, zoom/pan to navigate, and hover over a node to view its articles.</p>

<div class="graph-wrapper">
  <div id="graph-container"></div>
  <div id="graph-tooltip" class="graph-tooltip" style="opacity: 0; pointer-events: none;"></div>
</div>

<style>
  .graph-wrapper {
    position: relative;
    width: 100%;
    margin: 2rem 0;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background-color: #fafafa;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.01), 0 4px 12px rgba(0, 0, 0, 0.02);
    overflow: hidden;
  }

  #graph-container {
    width: 100%;
    height: 550px;
    background-color: #ffffff;
    cursor: grab;
  }

  #graph-container:active {
    cursor: grabbing;
  }

  /* Tooltip styling */
  .graph-tooltip {
    position: absolute;
    background-color: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-family: var(--font-poppins);
    font-size: 0.82rem;
    box-shadow: 0 10px 25px rgba(31, 35, 40, 0.08);
    z-index: 10;
    width: 260px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease-in-out;
  }

  .graph-tooltip-title {
    font-family: var(--font-poppins);
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--accent-color);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.25rem;
    font-size: 0.88rem;
  }

  .graph-tooltip-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .graph-tooltip-item {
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }

  .graph-tooltip-item:last-child {
    margin-bottom: 0;
  }

  .graph-tooltip-link {
    color: var(--text-main);
    text-decoration: none;
    font-weight: 400;
    transition: color var(--transition-speed) ease;
    display: inline-block;
  }

  .graph-tooltip-link:hover {
    color: var(--accent-color);
    text-decoration: underline;
  }

  /* SVG elements styling */
  .graph-node circle {
    stroke: #ffffff;
    stroke-width: 2px;
    cursor: pointer;
    transition: fill var(--transition-speed) ease, stroke-width var(--transition-speed) ease;
  }

  .graph-node text {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    pointer-events: none;
    user-select: none;
    paint-order: stroke;
    stroke: #ffffff;
    stroke-width: 3px;
    stroke-linejoin: round;
    fill: var(--text-muted);
    opacity: 0; /* Hidden by default */
    transition: opacity 0.25s ease, font-size 0.25s ease, font-weight 0.25s ease, fill 0.25s ease;
  }

  .graph-link {
    stroke: rgba(31, 35, 40, 0.08);
    stroke-opacity: 0.5;
    transition: stroke var(--transition-speed) ease, stroke-opacity var(--transition-speed) ease;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Raw post data generated by Jekyll compile-time
    const posts = [
      {% for post in site.posts %}
        {
          title: {{ post.title | jsonify }},
          url: {{ post.url | relative_url | jsonify }},
          categories: {{ post.categories | jsonify }}
        }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    // 2. Build graph data: nodes (unique tags) and links (co-occurrences in the same post)
    const tagCounts = {};
    const tagPosts = {};
    const coOccurrences = {};

    posts.forEach(post => {
      const tags = post.categories || [];
      tags.forEach(tag => {
        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        if (!tagPosts[tag]) {
          tagPosts[tag] = [];
        }
        tagPosts[tag].push(post);
      });

      // Calculate links between co-occurring tags
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const tagA = tags[i];
          const tagB = tags[j];
          // Sort alphabetically to avoid duplicate combinations (e.g. A-B and B-A)
          const key = tagA < tagB ? `${tagA}|||${tagB}` : `${tagB}|||${tagA}`;
          coOccurrences[key] = (coOccurrences[key] || 0) + 1;
        }
      }
    });

    const nodes = Object.keys(tagCounts).map(tag => ({
      id: tag,
      label: tag,
      count: tagCounts[tag],
      posts: tagPosts[tag]
    }));

    const links = Object.keys(coOccurrences).map(key => {
      const [source, target] = key.split('|||');
      return {
        source,
        target,
        value: coOccurrences[key]
      };
    });

    // 3. Setup container and SVG
    const container = document.getElementById('graph-container');
    const width = container.clientWidth || 720;
    const height = 550;

    const svg = d3.select('#graph-container')
      .append('svg')
      .attr('width', '100%')
      .attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`);

    // Main group inside SVG to hold all elements for zooming
    const mainGroup = svg.append('g');

    // Zooming behavior
    svg.call(d3.zoom()
      .scaleExtent([0.5, 3])
      .on('zoom', (event) => {
        mainGroup.attr('transform', event.transform);
      })
    );

    // 4. Set up physics simulation
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(75))
      .force('charge', d3.forceManyBody().strength(-80))
      .force('x', d3.forceX(width / 2).strength(0.08))
      .force('y', d3.forceY(height / 2).strength(0.08))
      .force('collide', d3.forceCollide().radius(d => {
        const r = 6 + Math.sqrt(d.count) * 4;
        return r + 16; // Add spacing to prevent text collision
      }));

    // Draw links/edges
    const link = mainGroup.append('g')
      .selectAll('line')
      .data(links)
      .enter()
      .append('line')
      .attr('class', 'graph-link')
      .attr('stroke-width', d => Math.min(5, 1.5 + (d.value - 1) * 0.8));

    // Draw nodes
    const node = mainGroup.append('g')
      .selectAll('g')
      .data(nodes)
      .enter()
      .append('g')
      .attr('class', 'graph-node')
      .call(drag(simulation));

    // Append circles for nodes (sized by count)
    const radius = d => 6 + Math.sqrt(d.count) * 4;
    
    node.append('circle')
      .attr('r', radius)
      .attr('fill', '#94a3b8') // Beautiful light gray-blue node
      .attr('stroke', '#ffffff')
      .attr('stroke-width', '2px');

    // Append text labels for nodes
    node.append('text')
      .attr('dy', d => radius(d) + 14) // Position label below the node
      .attr('text-anchor', 'middle')
      .text(d => d.label);

    // 5. Tooltip interaction logic with hover safety delay
    const tooltip = document.getElementById('graph-tooltip');
    let tooltipTimeout = null;
    let activeDraggedNode = null;
    let hoveredNode = null;

    function showTooltip(d, event) {
      clearTimeout(tooltipTimeout);

      // Construct list of articles matching this tag
      let html = `<div class="graph-tooltip-title">${d.id}</div>`;
      html += `<ul class="graph-tooltip-list">`;
      d.posts.forEach(post => {
        html += `
          <li class="graph-tooltip-item">
            <a class="graph-tooltip-link" href="${post.url}">${post.title}</a>
          </li>`;
      });
      html += `</ul>`;

      tooltip.innerHTML = html;
      tooltip.style.opacity = 1;
      tooltip.style.pointerEvents = 'auto'; // allow mouse interaction with links

      // Position tooltip near the hovered node relative to .graph-wrapper
      const wrapperRect = document.querySelector('.graph-wrapper').getBoundingClientRect();
      
      // Calculate tooltip position with a slight offset
      let x = event.clientX - wrapperRect.left + 15;
      let y = event.clientY - wrapperRect.top - 15;

      // Adjust if tooltip goes out of boundaries
      const tooltipWidth = 260;
      if (x + tooltipWidth > wrapperRect.width) {
        x = event.clientX - wrapperRect.left - tooltipWidth - 15;
      }

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltipTimeout = setTimeout(() => {
        tooltip.style.opacity = 0;
        tooltip.style.pointerEvents = 'none';
      }, 300); // 300ms window for the mouse to cross into the tooltip box
    }

    // Connect tooltip hover event handlers so it stays open when hovered
    tooltip.addEventListener('mouseenter', () => {
      clearTimeout(tooltipTimeout);
      tooltip.style.opacity = 1;
      tooltip.style.pointerEvents = 'auto';
    });

    tooltip.addEventListener('mouseleave', () => {
      hideTooltip();
    });

    // Node mouse hover interactivity
    node.on('mouseover', function(event, d) {
      hoveredNode = d;

      // Highlight hovered node circle
      d3.select(this).select('circle')
        .attr('fill', 'var(--accent-color)')
        .attr('stroke-width', '2.5px');

      // Highlight connections
      link
        .attr('stroke', l => (l.source.id === d.id || l.target.id === d.id) ? 'var(--accent-color)' : 'rgba(31, 35, 40, 0.05)')
        .attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.8 : 0.15);

      // Find connected tags to display their labels as well
      const connectedTagIds = new Set();
      links.forEach(l => {
        if (l.source.id === d.id) connectedTagIds.add(l.target.id);
        if (l.target.id === d.id) connectedTagIds.add(l.source.id);
      });

      // Update text labels opacity and style (with zoom effect on hovered)
      node.select('text')
        .style('opacity', n => {
          if (n.id === d.id) return 1;          // hovered tag fully visible
          if (connectedTagIds.has(n.id)) return 0.55; // neighboring tags semi-visible
          return 0;                             // others hidden
        })
        .style('font-size', n => n.id === d.id ? '0.82rem' : '0.72rem')
        .style('font-weight', n => n.id === d.id ? '600' : '400')
        .style('fill', n => n.id === d.id ? 'var(--accent-color)' : 'var(--text-muted)');

      showTooltip(d, event);
    })
    .on('mouseout', function(event, d) {
      hoveredNode = null;

      // Don't restore if this node is currently being dragged
      if (activeDraggedNode === d) return;

      // Restore node circle
      d3.select(this).select('circle')
        .attr('fill', '#94a3b8')
        .attr('stroke-width', '2px');

      // Restore connections
      link
        .attr('stroke', 'rgba(31, 35, 40, 0.08)')
        .attr('stroke-opacity', 0.5);

      // Hide all labels again
      node.select('text')
        .style('opacity', 0)
        .style('font-size', '0.72rem')
        .style('font-weight', '400')
        .style('fill', 'var(--text-muted)');

      hideTooltip();
    });

    // Update coordinates during force simulation ticks
    simulation.on('tick', () => {
      // Keep nodes within the boundary limits of the SVG container
      nodes.forEach(d => {
        const r = 6 + Math.sqrt(d.count) * 4;
        const padX = 65; // margin for text label horizontally
        const padYBottom = 30; // margin for text label vertically (bottom)
        const padYTop = 15;
        
        d.x = Math.max(padX, Math.min(width - padX, d.x));
        d.y = Math.max(padYTop, Math.min(height - padYBottom, d.y));
      });

      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node.attr('transform', d => `translate(${d.x}, ${d.y})`);
    });

    // 6. Node Dragging physics behavior implementation
    function drag(sim) {
      function dragstarted(event, d) {
        if (!event.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
        activeDraggedNode = d;

        // Ensure current label is visible during drag
        d3.select(this).select('text')
          .style('opacity', 1)
          .style('font-size', '0.82rem')
          .style('font-weight', '600')
          .style('fill', 'var(--accent-color)');
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null;
        d.fy = null;
        activeDraggedNode = null;

        // If the mouse is no longer hovering over this node, reset its visual state
        if (hoveredNode !== d) {
          d3.select(this).select('circle')
            .attr('fill', '#94a3b8')
            .attr('stroke-width', '2px');

          link
            .attr('stroke', 'rgba(31, 35, 40, 0.08)')
            .attr('stroke-opacity', 0.5);

          d3.select(this).select('text')
            .style('opacity', 0)
            .style('font-size', '0.72rem')
            .style('font-weight', '400')
            .style('fill', 'var(--text-muted)');
        }
      }

      return d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended);
    }
  });
</script>
