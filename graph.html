---
layout: page
title: Tag Graph
permalink: /graph/
---

<p class="lead">An interactive force-directed map of the categories on this blog. Drag nodes to explore relationships, zoom/pan to navigate, and hover over a node to view its articles.</p>

<div class="graph-header-controls">
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" id="graph-search" placeholder="Search categories..." autocomplete="off" />
    <div id="search-suggestions" class="search-suggestions-box"></div>
  </div>
</div>

<div class="graph-wrapper">
  <div id="graph-container"></div>
  <div id="graph-tooltip" class="graph-tooltip" style="opacity: 0; pointer-events: none;"></div>
  
  <!-- Floating zoom/pan controls -->
  <div class="graph-controls-box">
    <button id="zoom-in" title="Zoom In">＋</button>
    <button id="zoom-out" title="Zoom Out">－</button>
    <button id="zoom-reset" title="Reset View">⟲</button>
  </div>
  
  <!-- Scroll Zoom Hint -->
  <div id="zoom-hint" class="zoom-hint">Use Ctrl + Scroll to zoom</div>
</div>

<style>
  .graph-header-controls {
    display: flex;
    margin-bottom: 1.25rem;
    align-items: center;
  }

  .search-container {
    position: relative;
    width: 280px;
    max-width: 100%;
  }

  #graph-search {
    width: 100%;
    padding: 0.5rem 0.75rem 0.5rem 2.25rem;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    font-family: var(--font-poppins);
    font-size: 0.85rem;
    outline: none;
    background-color: #ffffff;
    color: var(--text-main);
    transition: border-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
  }

  #graph-search:focus {
    border-color: var(--accent-color);
    box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.1);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 52%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    color: var(--text-muted);
    pointer-events: none;
  }

  .search-suggestions-box {
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background-color: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 6px;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
    z-index: 20;
    max-height: 200px;
    overflow-y: auto;
    display: none;
    margin-top: 4px;
  }

  .suggestion-item {
    padding: 0.5rem 0.75rem;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: var(--font-poppins);
    color: var(--text-main);
    transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
  }

  .suggestion-item:hover, .suggestion-item.active {
    background-color: var(--code-bg);
    color: var(--accent-color);
  }

  .graph-wrapper {
    position: relative;
    width: 100%;
    margin: 1.5rem 0;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    background-color: #ffffff;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.005), 0 4px 12px rgba(0, 0, 0, 0.015);
    overflow: hidden;
  }

  #graph-container {
    width: 100%;
    height: 550px;
    background-color: #ffffff;
    cursor: grab;
  }

  #graph-container:active {
    cursor: grabbing;
  }

  /* Tooltip styling */
  .graph-tooltip {
    position: absolute;
    background-color: #ffffff;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-family: var(--font-poppins);
    font-size: 0.82rem;
    box-shadow: 0 10px 25px rgba(31, 35, 40, 0.08);
    z-index: 10;
    width: 260px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease-in-out;
  }

  .graph-tooltip-title {
    font-family: var(--font-poppins);
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: var(--accent-color);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.25rem;
    font-size: 0.88rem;
  }

  .graph-tooltip-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .graph-tooltip-item {
    margin-bottom: 0.5rem;
    line-height: 1.35;
  }

  .graph-tooltip-item:last-child {
    margin-bottom: 0;
  }

  .graph-tooltip-link {
    color: var(--text-main);
    text-decoration: none;

    transition: color var(--transition-speed) ease;
    display: inline-block;
  }

  .graph-tooltip-link:hover {

    text-decoration: underline;
  }

  /* SVG elements styling */
  .graph-node circle {
    stroke: #ffffff;
    stroke-width: 2px;
    cursor: pointer;
    transition: fill var(--transition-speed) ease, stroke-width var(--transition-speed) ease, opacity var(--transition-speed) ease;
  }

  .graph-node text {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    pointer-events: none;
    user-select: none;
    paint-order: stroke;
    stroke: #ffffff;
    stroke-width: 3px;
    stroke-linejoin: round;
    fill: var(--text-muted);
    transition: opacity 0.25s ease, font-size 0.25s ease, font-weight 0.25s ease, fill 0.25s ease;
  }

  .graph-link {
    stroke: rgba(31, 35, 40, 0.08);
    stroke-opacity: 0.5;
    transition: stroke var(--transition-speed) ease, stroke-opacity var(--transition-speed) ease;
  }

  .graph-controls-box {
    position: absolute;
    bottom: 1rem;
    right: 1rem;
    display: flex;
    flex-direction: column;
    gap: 2px;
    z-index: 5;
    background-color: rgba(255, 255, 255, 0.85);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 2px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  .graph-controls-box button {
    background: transparent;
    border: none;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    cursor: pointer;
    color: var(--text-muted);
    transition: all var(--transition-speed) ease;
    border-radius: 4px;
    outline: none;
  }

  .graph-controls-box button:hover {
    background-color: var(--code-bg);
    color: var(--text-main);
  }

  .zoom-hint {
    position: absolute;
    top: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(31, 35, 40, 0.9);
    color: #ffffff;
    padding: 0.4rem 0.75rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-family: var(--font-poppins);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Raw post data generated by Jekyll compile-time
    const posts = [
      {% for post in site.posts %}
        {
          title: {{ post.title | jsonify }},
          url: {{ post.url | relative_url | jsonify }},
          categories: {{ post.categories | jsonify }}
        }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    // 2. Build graph data: nodes (unique tags) and links (co-occurrences in the same post)
    const tagCounts = {};
    const tagPosts = {};
    const coOccurrences = {};

    posts.forEach(post => {
      const tags = post.categories || [];
      tags.forEach(tag => {
        tagCounts[tag] = (tagCounts[tag] || 0) + 1;
        if (!tagPosts[tag]) {
          tagPosts[tag] = [];
        }
        tagPosts[tag].push(post);
      });

      // Calculate links between co-occurring tags
      for (let i = 0; i < tags.length; i++) {
        for (let j = i + 1; j < tags.length; j++) {
          const tagA = tags[i];
          const tagB = tags[j];
          // Sort alphabetically to avoid duplicate combinations (e.g. A-B and B-A)
          const key = tagA < tagB ? `${tagA}|||${tagB}` : `${tagB}|||${tagA}`;
          coOccurrences[key] = (coOccurrences[key] || 0) + 1;
        }
      }
    });

    const nodes = Object.keys(tagCounts).map(tag => ({
      id: tag,
      label: tag,
      count: tagCounts[tag],
      posts: tagPosts[tag]
    }));

    const links = Object.keys(coOccurrences).map(key => {
      const [source, target] = key.split('|||');
      return {
        source,
        target,
        value: coOccurrences[key]
      };
    });

    // 3. Setup container and SVG
    const container = document.getElementById('graph-container');
    const width = container.clientWidth || 720;
    const height = 550;

    const svg = d3.select('#graph-container')
      .append('svg')
      .attr('width', '100%')
      .attr('height', height)
      .attr('viewBox', `0 0 ${width} ${height}`);

    // Main group inside SVG to hold all elements for zooming
    const mainGroup = svg.append('g');

    // Premium custom colors for categories
    const colors = [
      '#0969da', // GitHub Blue
      '#2da44e', // Green
      '#8250df', // Purple
      '#bf3989', // Magenta
      '#bc4c00', // Orange
      '#cf222e', // Red
      '#005f5e', // Teal
      '#1a7f37', // Dark green
      '#8c5b00'  // Gold-brown
    ];

    function getNodeColor(id) {
      let hash = 0;
      for (let i = 0; i < id.length; i++) {
        hash = id.charCodeAt(i) + ((hash << 5) - hash);
      }
      const index = Math.abs(hash) % colors.length;
      return colors[index];
    }

    // Zooming behavior with scroll hijacking prevention
    let zoomHintTimeout;
    const zoomHint = document.getElementById('zoom-hint');

    const zoom = d3.zoom()
      .scaleExtent([0.4, 4])
      .wheelDelta((event) => {
        // Much smoother zoom speed (20% of default D3 sensitivity)
        return -event.deltaY * (event.deltaMode === 1 ? 0.01 : 0.0004);
      })
      .filter((event) => {
        // Prevent scroll hijack: allow wheel zoom ONLY when holding Ctrl key
        if (event.type === 'wheel' && !event.ctrlKey) {
          if (zoomHint) {
            zoomHint.style.opacity = '1';
            clearTimeout(zoomHintTimeout);
            zoomHintTimeout = setTimeout(() => {
              zoomHint.style.opacity = '0';
            }, 1800);
          }
          return false; // blocks wheel zoom
        }
        return !event.ctrlKey || event.type === 'wheel';
      })
      .on('zoom', (event) => {
        mainGroup.attr('transform', event.transform);
      });

    svg.call(zoom);

    // Zoom buttons connection
    d3.select('#zoom-in').on('click', () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1.3);
    });

    d3.select('#zoom-out').on('click', () => {
      svg.transition().duration(250).call(zoom.scaleBy, 1 / 1.3);
    });

    d3.select('#zoom-reset').on('click', () => {
      svg.transition().duration(350).call(
        zoom.transform,
        d3.zoomIdentity
      );
    });

    // 4. Set up physics simulation
    const simulation = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(80))
      .force('charge', d3.forceManyBody().strength(-120))
      .force('x', d3.forceX(width / 2).strength(0.08))
      .force('y', d3.forceY(height / 2).strength(0.08))
      .force('collide', d3.forceCollide().radius(d => {
        const r = 6 + Math.sqrt(d.count) * 4;
        return r + 24; // Add spacing to prevent text collision
      }));

    // Draw links/edges
    const link = mainGroup.append('g')
      .selectAll('line')
      .data(links)
      .enter()
      .append('line')
      .attr('class', 'graph-link')
      .attr('stroke-width', d => Math.min(5, 1.5 + (d.value - 1) * 0.8));

    // Draw nodes
    const node = mainGroup.append('g')
      .selectAll('g')
      .data(nodes)
      .enter()
      .append('g')
      .attr('class', 'graph-node')
      .call(drag(simulation));

    // Append circles for nodes (sized by count and color-coded)
    const radius = d => 6 + Math.sqrt(d.count) * 4;
    
    node.append('circle')
      .attr('r', radius)
      .attr('fill', d => getNodeColor(d.id))
      .attr('stroke', '#ffffff')
      .attr('stroke-width', '2px');

    // Append text labels for nodes (visible by default with styled opacity)
    node.append('text')
      .attr('dy', d => radius(d) + 14)
      .attr('text-anchor', 'middle')
      .text(d => d.label)
      .style('opacity', d => d.count > 1 ? 0.8 : 0.45)
      .style('font-size', '0.7rem')
      .style('font-weight', '400')
      .style('fill', 'var(--text-muted)');

    // 5. Tooltip interaction logic
    const tooltip = document.getElementById('graph-tooltip');
    let tooltipTimeout = null;
    let activeDraggedNode = null;
    let hoveredNode = null;

    function showTooltip(d, event) {
      clearTimeout(tooltipTimeout);

      let html = `<div class="graph-tooltip-title">${d.id}</div>`;
      html += `<ul class="graph-tooltip-list">`;
      d.posts.forEach(post => {
        html += `
          <li class="graph-tooltip-item">
            <a class="graph-tooltip-link" href="${post.url}">${post.title}</a>
          </li>`;
      });
      html += `</ul>`;

      tooltip.innerHTML = html;
      tooltip.style.opacity = 1;
      tooltip.style.pointerEvents = 'auto'; // allow mouse interaction with links

      const wrapperRect = document.querySelector('.graph-wrapper').getBoundingClientRect();
      
      let clientX, clientY;
      if (event && event.clientX !== undefined) {
        clientX = event.clientX;
        clientY = event.clientY;
      } else {
        // Fallback positioning relative to current zoom coordinates
        const transform = d3.zoomTransform(svg.node());
        clientX = wrapperRect.left + (d.x * transform.k + transform.x);
        clientY = wrapperRect.top + (d.y * transform.k + transform.y);
      }

      let x = clientX - wrapperRect.left + 15;
      let y = clientY - wrapperRect.top - 15;

      const tooltipWidth = 260;
      if (x + tooltipWidth > wrapperRect.width) {
        x = clientX - wrapperRect.left - tooltipWidth - 15;
      }

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function hideTooltip() {
      tooltipTimeout = setTimeout(() => {
        tooltip.style.opacity = 0;
        tooltip.style.pointerEvents = 'none';
      }, 300);
    }

    tooltip.addEventListener('mouseenter', () => {
      clearTimeout(tooltipTimeout);
      tooltip.style.opacity = 1;
      tooltip.style.pointerEvents = 'auto';
    });

    tooltip.addEventListener('mouseleave', () => {
      hideTooltip();
    });

    // Node mouse hover interactivity
    node.on('mouseover', function(event, d) {
      hoveredNode = d;

      // Find connected tags to display their labels as well
      const connectedTagIds = new Set();
      links.forEach(l => {
        if (l.source.id === d.id) connectedTagIds.add(l.target.id);
        if (l.target.id === d.id) connectedTagIds.add(l.source.id);
      });

      // Highlight connections: active ones color-coded, others faded
      const activeColor = getNodeColor(d.id);
      link
        .attr('stroke', l => (l.source.id === d.id || l.target.id === d.id) ? activeColor : 'rgba(31, 35, 40, 0.03)')
        .attr('stroke-opacity', l => (l.source.id === d.id || l.target.id === d.id) ? 0.8 : 0.05);

      // Fade other circles, keep active circle highlighted
      node.select('circle')
        .attr('fill', n => n.id === d.id ? getNodeColor(n.id) : (connectedTagIds.has(n.id) ? getNodeColor(n.id) : '#cbd5e1'))
        .style('opacity', n => n.id === d.id ? 1 : (connectedTagIds.has(n.id) ? 0.9 : 0.15))
        .attr('stroke-width', n => n.id === d.id ? '3px' : '1.5px');

      // Update text labels style and opacity
      node.select('text')
        .style('opacity', n => {
          if (n.id === d.id) return 1;          // hovered tag fully visible
          if (connectedTagIds.has(n.id)) return 0.75; // neighboring tags semi-visible
          return 0.05;                             // others faded out
        })
        .style('font-size', n => n.id === d.id ? '0.82rem' : '0.72rem')
        .style('font-weight', n => n.id === d.id ? '600' : '400')
        .style('fill', n => n.id === d.id ? 'var(--text-main)' : 'var(--text-muted)');

      showTooltip(d, event);
    })
    .on('mouseout', function(event, d) {
      hoveredNode = null;

      // Don't restore if this node is currently being dragged
      if (activeDraggedNode === d) return;

      // Restore node circle
      node.select('circle')
        .attr('fill', n => getNodeColor(n.id))
        .style('opacity', 1)
        .attr('stroke-width', '2px');

      // Restore connections
      link
        .attr('stroke', 'rgba(31, 35, 40, 0.08)')
        .attr('stroke-opacity', 0.5);

      // Restore all labels
      node.select('text')
        .style('opacity', n => n.count > 1 ? 0.8 : 0.45)
        .style('font-size', '0.7rem')
        .style('font-weight', '400')
        .style('fill', 'var(--text-muted)');

      hideTooltip();
    });

    // Update coordinates during force simulation ticks
    simulation.on('tick', () => {
      // Keep nodes within the boundary limits of the SVG container
      nodes.forEach(d => {
        const r = 6 + Math.sqrt(d.count) * 4;
        const padX = 65; // margin for text label horizontally
        const padYBottom = 30; // margin for text label vertically (bottom)
        const padYTop = 15;
        
        d.x = Math.max(padX, Math.min(width - padX, d.x));
        d.y = Math.max(padYTop, Math.min(height - padYBottom, d.y));
      });

      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);

      node.attr('transform', d => `translate(${d.x}, ${d.y})`);
    });

    // 6. Node Dragging physics behavior implementation
    function drag(sim) {
      function dragstarted(event, d) {
        if (!event.active) sim.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
        activeDraggedNode = d;

        node.select('circle')
          .style('opacity', n => n.id === d.id ? 1 : 0.15);
        
        node.select('text')
          .style('opacity', n => n.id === d.id ? 1 : 0.05);
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) sim.alphaTarget(0);
        d.fx = null;
        d.fy = null;
        activeDraggedNode = null;

        // If the mouse is no longer hovering over this node, reset its visual state
        if (hoveredNode !== d) {
          node.select('circle')
            .attr('fill', n => getNodeColor(n.id))
            .style('opacity', 1)
            .attr('stroke-width', '2px');

          link
            .attr('stroke', 'rgba(31, 35, 40, 0.08)')
            .attr('stroke-opacity', 0.5);

          node.select('text')
            .style('opacity', n => n.count > 1 ? 0.8 : 0.45)
            .style('font-size', '0.7rem')
            .style('font-weight', '400')
            .style('fill', 'var(--text-muted)');
        }
      }

      return d3.drag()
        .on('start', dragstarted)
        .on('drag', dragged)
        .on('end', dragended);
    }

    // 7. Search autocomplete & Focus implementation
    const searchInput = document.getElementById('graph-search');
    const suggestionsBox = document.getElementById('search-suggestions');
    const allTags = nodes.map(n => n.id).sort();

    searchInput.addEventListener('input', () => {
      const val = searchInput.value.toLowerCase().trim();
      suggestionsBox.innerHTML = '';
      if (!val) {
        suggestionsBox.style.display = 'none';
        return;
      }

      const matches = allTags.filter(tag => tag.toLowerCase().includes(val));
      if (matches.length === 0) {
        suggestionsBox.style.display = 'none';
        return;
      }

      matches.forEach(match => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.textContent = match;
        item.addEventListener('click', () => {
          searchInput.value = match;
          suggestionsBox.style.display = 'none';
          focusOnNode(match);
        });
        suggestionsBox.appendChild(item);
      });
      suggestionsBox.style.display = 'block';
    });

    document.addEventListener('click', (e) => {
      if (e.target !== searchInput) {
        suggestionsBox.style.display = 'none';
      }
    });

    function focusOnNode(nodeId) {
      const targetNode = nodes.find(n => n.id === nodeId);
      if (!targetNode) return;

      const scale = 1.6;
      const x = width / 2 - targetNode.x * scale;
      const y = height / 2 - targetNode.y * scale;

      const transform = d3.zoomIdentity
        .translate(x, y)
        .scale(scale);

      svg.transition()
        .duration(850)
        .call(zoom.transform, transform)
        .on('end', () => {
          const nodeSelection = node.filter(n => n.id === nodeId);
          if (nodeSelection.node()) {
            const rect = nodeSelection.node().getBoundingClientRect();
            const wrapperRect = document.querySelector('.graph-wrapper').getBoundingClientRect();
            
            const fakeEvent = {
              clientX: rect.left + rect.width / 2,
              clientY: rect.top + rect.height / 2
            };
            
            nodeSelection.dispatch('mouseover', {
              detail: { event: fakeEvent, data: targetNode }
            });
            
            showTooltip(targetNode, fakeEvent);
          }
        });
    }
  });
</script>
